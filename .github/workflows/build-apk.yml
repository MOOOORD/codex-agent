name: Build APK
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Install Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip android-sdk 2>&1 | tail -5
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
          ls -la /usr/lib/android-sdk/ 2>/dev/null || echo "SDK not found at /usr/lib/android-sdk"

      - name: Build APK (debug)
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-agent.apk
          path: android/**/*.apk
