name: Build APK
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Install Android SDK + NDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip 2>&1 | tail -3
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME && cd $ANDROID_HOME
          wget -q https://mirrors.cloud.tencent.com/AndroidSDK/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip && rm tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null; mv cmdline-tools/latest/cmdline-tools/* cmdline-tools/latest/ 2>/dev/null; rmdir cmdline-tools/latest/cmdline-tools 2>/dev/null; true
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" "ndk;24.0.8215888" "platform-tools" > /dev/null 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Build APK (debug)
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-agent.apk
          path: android/**/*.apk
